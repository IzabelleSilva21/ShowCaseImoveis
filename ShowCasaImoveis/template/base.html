{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!--    Tag para fazer o site se adaptar a telas de celulares e tablets-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %} ShowCase Imóveis {%endblock%}</title>
    <!--    Adicionando o CSS do bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="bg-light">

<div class="container mt-3">        <!-- container centraliza o site e cria margens iguais.  mt-3 dá espaço no topo-->

    <!--sistema de alertas. Caso eu mande disparar alguma mensagem de aviso na tela -->
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show"
         role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
    {% endif %}

    <!-- Barra de navegação - cabeçalho responsivo (só aparece se estiver logado) -->
    {% if user.is_authenticated %}
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm border-bottom py-3">
        <div class="container-fluid">

            <a class="navbar-brand fw-bold text-primary fs-4 d-flex align-items-center gap-2"
               href="{% url 'pagina_inicial' %}">
                <i class="bi bi-building text-success"></i>
                <span>ShowCase Imóveis</span>
            </a>

            <!--            Botão hamburguer (navbar-toggler)-->
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#conteudoNavbar"
                    aria-controls="conteudoNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!--        O Bloco Retrátil (collapse e os links)-->
            <div class="collapse navbar-collapse" id="conteudoNavbar">
                <div class="navbar-nav ms-auto align-items-lg-center mt-2 mt-lg-0">
                    <div class="dropdown">

                        <button class="d-flex align-items-center gap-2 border-0 bg-transparent text-decoration-none dropdown-toggle link-dark fw-medium py-1 px-2 rounded-3 hover-bg w-100 text-start"
                                type="button" id="dropdownPerfil" data-bs-toggle="dropdown" aria-expanded="false">

                            <i class="bi bi-person-circle fs-3 text-secondary"></i>

                            <span class="d-none d-sm-inline">{{ user.username }}</span>

                            {% if user.perfil_corretor %}
                            <span class="badge bg-success-subtle text-success border border-success-subtle text-uppercase px-2 py-1 ms-1 navbar-badge-perfil">Corretor</span>
                            {% else %}
                            <span class="badge bg-info-subtle text-info border border-info-subtle text-uppercase px-2 py-1 ms-1 navbar-badge-perfil">Cliente</span>
                            {% endif %}
                        </button>

                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 p-2 rounded-3 dropdown-menu-perfil" aria-labelledby="dropdownPerfil">

                            <li>
                                <a class="dropdown-item d-flex align-items-center gap-2 py-2 rounded-2"
                                   href="{% url 'detalhes_perfil' %}">
                                    <i class="bi bi-gear text-secondary"></i> Meus Dados
                                </a>
                            </li>

                            <li>
                                <hr class="dropdown-divider my-2">
                            </li>

                            <li>
                                <a class="dropdown-item d-flex align-items-center gap-2 py-2 rounded-2 text-danger"
                                   href="{% url 'logout' %}">
                                    <i class="bi bi-box-arrow-right"></i> Sair da Conta
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>

            </div>
        </div>
    </nav>
    {% endif %}

    <main>
        {% block content%}
        {% endblock %}
    </main>

</div>

<!--    Adicionando o javaScript do bootstrap-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>

<!--    Importando o js local -->
<script src="{% static 'js/script.js' %}"></script>
</body>
</html>
