{%extends 'base.html'%}
{% load static %}

{% block titulo %} Cadastrar Usuário | ShowCase Imóveis {% endblock %}

{%block content%}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0"> Cadastrar Usuário </h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="usuario" class="form-label"> Usuário </label>
                        <input type="text" name="username" class="form-control" id="usuario"
                               placeholder="Digite seu usuário" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label"> E-mail </label>
                        <input type="email" name="email" class="form-control" id="email"
                        placeholder="exemplo@gmail.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="telefone" class="form-label"> Telefone </label>
                        <input type="text" name="telefone" class="form-control" id="telefone"
                               placeholder="(DD) 99999-9999" required>
                    </div>

                    <div class="mb-3">
                        <label for="tipo_usuario" class="form-label"> Tipo de Usuário </label>
                        <select name="tipo_usuario" id="tipo_usuario" class="form-select" required>
                            <option value="cliente" selected> Cliente </option>
                            <option value="corretor"> Corretor </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="senha" class="form-label"> Senha </label>
                        <input type="password" name="password" class="form-control" id="senha"
                               placeholder="Cadastre uma senha" required>
                    </div>

                    <div class="mb-3">
                        <label for="confirmar_senha" class="form-label"> Confirmar Senha </label>
                        <input type="password" name="password_confirm" class="form-control" id="confirmar_senha"
                               placeholder="Confirme sua senha" required>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary"> Cadastrar </button>
                    </div>

                </form>

            </div>

            <div class="card-footer text-center bg-light py-3">
                <small> Já possui conta? <a href="{% url 'login' %}"> Faça Login </a></small>
            </div>
        </div>
    </div>
</div>

{% endblock %}
